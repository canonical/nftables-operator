name: Tests

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths-ignore:
      - "**.md"
      - "**.rst"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

# Least privilege: every job here only reads the repository.
permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install ruff
      - name: Lint
        run: ruff check .
      - name: Check formatting
        run: ruff format --check .

  unit:
    name: Unit
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: python -m pip install -e '.[dev]'
      - name: Run unit tests
        run: pytest tests/unit

  integration:
    name: Integration
    needs:
      - lint
      - unit
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Set up Juju and LXD
        # Pinned to a commit SHA (supply-chain hardening); bump deliberately.
        uses: charmed-kubernetes/actions-operator@d8217ad61c15f746727a9d41563c13e9b9fe56e3  # main
        with:
          provider: "lxd"
          juju-channel: "3.6/stable"
          charmcraft-channel: "3.x/stable"
      - name: Pack the charm
        run: charmcraft -v pack
      - name: Upload the packed charm
        uses: actions/upload-artifact@v7
        with:
          name: built_charms_amd64
          path: ./*.charm
      - name: Install dependencies
        run: python -m pip install -e '.[dev]'
      - name: Run integration tests
        run: |
          export CHARM_PATH="$(pwd)/$(ls *.charm | head -n1)"
          pytest tests/integration
