name: Release to Edge

on:
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read

jobs:
  check:
    uses: ./.github/workflows/check.yaml

  release:
    needs: check
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install charmcraft
        run: sudo snap install charmcraft --classic --channel 3.x/stable

      - name: Download the tested charms
        uses: actions/download-artifact@v8
        with:
          pattern: built_charms_*
          merge-multiple: true

      - name: Upload and release every base to Charmhub
        # charmcraft emits one .charm per base; upload each and release it to
        # latest/edge so the channel serves the right revision for every base.
        env:
          CHARMCRAFT_AUTH: ${{ secrets.CHARMHUB_TOKEN }}
        run: |
          shopt -s nullglob
          charms=(*.charm)
          if [ ${#charms[@]} -eq 0 ]; then
            echo "error: no charms found to publish" >&2
            exit 1
          fi
          for charm in "${charms[@]}"; do
            echo "::group::publish ${charm}"
            charmcraft upload "${charm}" --release latest/edge
            echo "::endgroup::"
          done
