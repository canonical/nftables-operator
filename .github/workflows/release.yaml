name: Release to Edge

on:
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read

jobs:
  check:
    uses: ./.github/workflows/check.yaml

  release:
    needs: check
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Download the tested charms
        uses: actions/download-artifact@v8
        with:
          pattern: built_charms_*
          merge-multiple: true

      - name: List the names of the tested charms
        run: echo "CHARM_NAMES=$(ls *.charm | paste -sd ,)" | tee -a "$GITHUB_ENV"

      - name: Upload to Charmhub
        uses: canonical/charming-actions/upload-charm@1753e0803f70445132e92acd45c905aba6473225  # 2.7.0
        with:
          credentials: "${{ secrets.CHARMHUB_TOKEN }}"
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          built-charm-path: "${{ env.CHARM_NAMES }}"
